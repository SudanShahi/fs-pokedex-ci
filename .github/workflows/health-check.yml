name: Periodic Health Check

on:
  workflow_dispatch:
  schedule:
    - cron: '0 12 * * *'

jobs:
  health_check:
    runs-on: ubuntu-latest
    steps:
      - name: Check deployed application
        uses: jtalk/url-health-check-action@v4
        with:
          url: https://fs-pokedex-ci.onrender.com
          follow-redirect: true
          max-attempts: 3
          retry-delay: 10s
          retry-all: false